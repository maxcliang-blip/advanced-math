<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    if (!path || path === '/') {
      window.location.href = '/index.html';
    } else {
      window.location.href = '/index.html';
    }
  </script>
</head>
<body>
  <p>Redirecting to <a href="/index.html">home page</a>...</p>
</body>
</html>
